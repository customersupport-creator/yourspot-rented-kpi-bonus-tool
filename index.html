*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
#sidebar{width:250px;background:var(--navy-dark);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:left .3s;}
.sidebar-header{padding:20px;text-align:center;border-bottom:1px solid var(--border);}
.sidebar-header h2{color:var(--gold);font-size:18px;}
.sidebar-header p{color:var(--text-muted);font-size:12px;margin-top:4px;}
.nav-item{padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;color:var(--text-muted);transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--navy-light);color:var(--text);}
.nav-item.active{background:var(--navy);color:var(--gold);border-left-color:var(--gold);}
.nav-item i{width:20px;text-align:center;}
#main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
#topbar{background:var(--navy);padding:15px 25px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
#topbar h1{font-size:20px;color:var(--gold);}
.topbar-controls{display:flex;align-items:center;gap:15px;}
#monthSelect{background:var(--navy-light);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:14px;}
.hamburger{display:none;background:none;border:none;color:var(--gold);font-size:24px;cursor:pointer;}
#content{padding:25px;flex:1;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:25px;}
.stat-card{background:var(--card);border-radius:10px;padding:20px;border:1px solid var(--border);transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);}
.stat-card .label{color:var(--text-muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;}
.stat-card .value{font-size:28px;font-weight:700;color:var(--gold);margin:8px 0;}
.stat-card .sub{font-size:12px;color:var(--text-muted);}
.chart-container{background:var(--card);border-radius:10px;padding:20px;border:1px solid var(--border);margin-bottom:25px;}
.chart-container h3{color:var(--gold);margin-bottom:15px;}
.chart-wrap{position:relative;height:300px;}
.form-section{background:var(--card);border-radius:10px;padding:20px;border:1px solid var(--border);margin-bottom:20px;}
.form-section h3{color:var(--gold);margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.form-group{margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.form-group label{min-width:280px;font-size:14px;color:var(--text);}
.form-group input,.form-group select{background:var(--navy-light);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:14px;width:120px;}
.form-group select{width:200px;}
.form-group .impact{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.impact-HIGH{background:#e74c3c33;color:#e74c3c;}
.impact-MED-HIGH{background:#ff980033;color:#ff9800;}
.impact-MEDIUM{background:#2196f333;color:#2196f3;}
.impact-LOW-MED{background:#4caf5033;color:#4caf50;}
.form-group .kpi-value{color:var(--gold);font-weight:600;min-width:80px;}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-gold{background:var(--gold);color:var(--navy-dark);}
.btn-gold:hover{background:var(--gold-light);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#c0392b;}
.btn-info{background:var(--info);color:#fff;}
.btn-info:hover{background:#1976d2;}
.btn-success{background:var(--success);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
th{background:var(--navy-dark);color:var(--gold);font-size:13px;text-transform:uppercase;letter-spacing:.5px;}
td{font-size:14px;}
tr:hover{background:var(--navy-light);}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.badge-top{background:#4caf5033;color:#4caf50;}
.badge-low{background:#e74c3c33;color:#e74c3c;}
.badge-none{background:#66666633;color:#999;}
.tabs{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;background:var(--navy-dark);color:var(--text-muted);border:1px solid var(--border);border-bottom:none;font-size:13px;transition:all .2s;}
.tab.active{background:var(--card);color:var(--gold);font-weight:600;}
.deduction-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--navy-dark);border-radius:6px;margin-bottom:8px;}
.deduction-item .desc{flex:1;font-size:13px;}
.deduction-item .amt{color:var(--danger);font-weight:600;}
.summary-box{background:var(--navy-dark);border-radius:8px;padding:15px;margin-top:15px;border-left:3px solid var(--gold);}
.summary-box h4{color:var(--gold);margin-bottom:8px;}
.summary-box .row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;}
.summary-box .row .val{color:var(--gold);font-weight:600;}
textarea{background:var(--navy-light);color:var(--text);border:1px solid var(--border);padding:10px;border-radius:6px;width:100%;min-height:80px;font-family:inherit;font-size:14px;resize:vertical;}
.coaching-section{margin-bottom:15px;}
.coaching-section label{display:block;color:var(--gold);margin-bottom:5px;font-weight:600;font-size:14px;}
#toast{position:fixed;bottom:30px;right:30px;background:var(--success);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;}
.override-group{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.override-group label{min-width:180px;font-size:13px;color:var(--text-muted);}
.override-group input{width:100px;}
.btn-row{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;}
@media(max-width:768px){
#sidebar{left:-250px;}
#sidebar.open{left:0;}
#main{margin-left:0;}
.hamburger{display:block;}
.stats-grid{grid-template-columns:1fr 1fr;}
}
@media print{
#sidebar,#topbar,.btn,.hamburger,#toast{display:none!important;}
#main{margin-left:0;}
body{background:#fff;color:#000;}
.stat-card,.form-section,.chart-container,.card{background:#fff;border:1px solid #ccc;color:#000;}
th{background:#eee;color:#000;}
.coaching-print{page-break-inside:avoid;}
}
</style>
</head>

if(!data[m])data[m]={cc_team:{},admin_team:{},individual:{},deductions:[],coaching:{},topPerformer:{cc:'',admin:''},lowPerformer:{cc:'',admin:''},ccTeamGrossOverride:null,ccTeamNetOverride:null,ccMemberCount:null,adminTeamTotalOverride:null,adminMemberCount:null};
return data[m];
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function fmt(v){return'$'+parseFloat(v||0).toFixed(2);}

function calcCCTeamKPI(kpi,val){
if(val===''||val===null||val===undefined)return 0;
val=parseFloat(val);
if(isNaN(val))return 0;
if(kpi.type==='per_unit')return val*kpi.rate;
if(kpi.type==='tier'){for(const t of kpi.tiers){if(val>=t.min&&val<=t.max)return t.val;}return 0;}
if(kpi.type==='tier_time')return val;
return 0;
}

function calcAdminTeamKPI(kpi,val){
if(val===''||val===null||val===undefined)return 0;
if(kpi.type==='per_unit'){val=parseFloat(val);return isNaN(val)?0:val*kpi.rate;}
if(kpi.type==='tier'){val=parseFloat(val);if(isNaN(val))return 0;for(const t of kpi.tiers){if(val>=t.min&&val<=t.max)return t.val;}return 0;}
if(kpi.type==='select')return parseFloat(val)||0;
return 0;
}

function getCCTeamTotal(m){
const d=getMonthData(m);
if(d.ccTeamGrossOverride!==null&&d.ccTeamGrossOverride!==undefined&&d.ccTeamGrossOverride!=='')return parseFloat(d.ccTeamGrossOverride);
let total=0;
getCCTeamKPIs(m).forEach(k=>{total+=calcCCTeamKPI(k,d.cc_team[k.id]);});
return total;
}

function getCCTeamNet(m){
const d=getMonthData(m);
if(d.ccTeamNetOverride!==null&&d.ccTeamNetOverride!==undefined&&d.ccTeamNetOverride!=='')return parseFloat(d.ccTeamNetOverride);
const gross=getCCTeamTotal(m);
const dedCount=(d.deductions||[]).length;
return gross*(1-dedCount*10/100);
}

function getAdminTeamTotal(m){
const d=getMonthData(m);
if(d.adminTeamTotalOverride!==null&&d.adminTeamTotalOverride!==undefined&&d.adminTeamTotalOverride!=='')return parseFloat(d.adminTeamTotalOverride);
let total=0;
getAdminTeamKPIs(m).forEach(k=>{total+=calcAdminTeamKPI(k,d.admin_team[k.id]);});
return total;
}

function getIndividualTotal(m,person){
const d=getMonthData(m);
const pData=d.individual[person]||{};
const kpis=getKPIsForPerson(person);
let total=0;
kpis.forEach(k=>{total+=parseFloat(pData[k.id])||0;});
return total;
}

function getTeamForPerson(p){
if(CC_MEMBERS.includes(p)||p==='Hazel')return'cc';
return'admin';
}

function getLowPerfDeduction(m,person){
if(m<'2026-06')return 0;
let consecutive=0;
const mIdx=MONTHS.findIndex(x=>x.key===m);
for(let i=mIdx;i>=0;i--){
if(MONTHS[i].key<'2026-06')break;
const md=getMonthData(MONTHS[i].key);
const team=getTeamForPerson(person);
if((team==='cc'&&md.lowPerformer.cc===person)||(team==='admin'&&md.lowPerformer.admin===person)){consecutive++;}
else break;
}
if(consecutive>=3)return 1;
if(consecutive===2)return 0.5;
if(consecutive===1)return 0.25;
return 0;
}

function getFinalBonus(m,person){
const d=getMonthData(m);
const indTotal=getIndividualTotal(m,person);
const team=getTeamForPerson(person);
let teamShare=0;
if(team==='cc'){
const net=getCCTeamNet(m);
const count=d.ccMemberCount||CC_MEMBERS.length+1;
teamShare=net/count;
}else{
const total=getAdminTeamTotal(m);
const count=d.adminMemberCount||ADMIN_MEMBERS.length;
teamShare=total/count;
}
const lowDed=getLowPerfDeduction(m,person);
let bonus=indTotal+teamShare*(1-lowDed);
const isTop=(team==='cc'&&d.topPerformer.cc===person)||(team==='admin'&&d.topPerformer.admin===person);
if(isTop&&m>='2026-06')bonus+=25;
return bonus;
}

function getConsecutiveLow(person,upToMonth){
if(upToMonth<'2026-06')return 0;
let count=0;
const mIdx=MONTHS.findIndex(x=>x.key===upToMonth);
for(let i=mIdx;i>=0;i--){
if(MONTHS[i].key<'2026-06')break;
const md=getMonthData(MONTHS[i].key);
const team=getTeamForPerson(person);
if((team==='cc'&&md.lowPerformer.cc===person)||(team==='admin'&&md.lowPerformer.admin===person))count++;
else break;
}
return count;
}

function getSanction(consecutiveLow){
if(consecutiveLow>=3)return'PIP (100% deduction)';
if(consecutiveLow===2)return'50% team bonus deduction';
if(consecutiveLow===1)return'25% team bonus deduction';
return'None';
}

function navigate(page){

document.querySelectorAll('.nav-item').forEach(n=>{n.classList.toggle('active',n.dataset.page===page);});
const titles={dashboard:'Dashboard',ccteam:'CC Team KPI',adminteam:'Admin Team KPI',individual:'Individual KPI',summary:'Bonus Summary',tracker:'Performance Tracker',coaching:'Coaching Card',pip:'PIP Tracking',schedule:'Coaching Schedule'};
document.getElementById('pageTitle').textContent=titles[page]||'Dashboard';
Object.values(charts).forEach(c=>{if(c&&c.destroy)c.destroy();});
charts={};
const renderers={dashboard:renderDashboard,ccteam:renderCCTeam,adminteam:renderAdminTeam,individual:renderIndividual,summary:renderSummary,tracker:renderTracker,coaching:renderCoaching,pip:renderPIP,schedule:renderSchedule};
(renderers[page]||renderDashboard)();
}

function changeMonth(m){currentMonth=m;navigate(currentPage);}

function getPIPData(){if(!data._pip)data._pip=[];return data._pip;}

function getAutoFlags(){
const flags=[];
ALL_MEMBERS.forEach(p=>{
const consec=getConsecutiveLow(p,currentMonth);
if(consec>=3){
const existing=getPIPData().find(pip=>pip.person===p&&pip.status!=='Completed'&&pip.status!=='Removed');
if(!existing)flags.push({person:p,consecutiveLow:consec,team:getTeamForPerson(p)});
}
});
return flags;
}

pips.push({id:Date.now(),person:person,reason:reason,startDate:startDate||currentMonth,endDate:endDate||'',status:'Active',goals:[],progressNotes:[],enrolledMonth:currentMonth,auto:false});

}

// ===== COACHING SCHEDULE =====
function getScheduleData(){if(!data._coachingSched)data._coachingSched=[];return data._coachingSched;}

function addSession(){
const emp=document.getElementById('schedEmp').value;
const date=document.getElementById('schedDate').value;
const topic=document.getElementById('schedTopic').value.trim();
const followUp=document.getElementById('schedFollowUp').value;
if(!date||!topic){toast('Date and topic are required');return;}
const sched=getScheduleData();
sched.push({id:Date.now(),employee:emp,date:date,topic:topic,notes:'',followUpDate:followUp,status:'Scheduled',createdMonth:currentMonth});
data._coachingSched=sched;saveData();renderSchedule();toast('Session scheduled for '+emp);
}

function updateSessionStatus(id,status){
const s=getScheduleData().find(x=>x.id===id);
if(s){s.status=status;saveData();renderSchedule();}
}

function saveSessionNotes(id){
const s=getScheduleData().find(x=>x.id===id);
const notes=document.getElementById('schedNotes_'+id).value;
if(s){s.notes=notes;saveData();toast('Notes saved');}
}

function updateSessionField(id,field,val){
const s=getScheduleData().find(x=>x.id===id);
if(s){s[field]=val;saveData();}
}

function deleteSession(id){
const sched=getScheduleData();
const idx=sched.findIndex(x=>x.id===id);
if(idx>=0){sched.splice(idx,1);data._coachingSched=sched;saveData();renderSchedule();toast('Session removed');}
}

function formatSchedDate(d){
if(!d)return'-';
const dt=new Date(d+'T00:00:00');
return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',weekday:'short'});
}

function renderSchedule(){
const sched=getScheduleData();
const today=new Date().toISOString().slice(0,10);
const upcoming=sched.filter(s=>s.status==='Scheduled'&&s.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
const overdue=sched.filter(s=>s.status==='Scheduled'&&s.date<today).sort((a,b)=>a.date.localeCompare(b.date));
const completed=sched.filter(s=>s.status==='Completed').sort((a,b)=>b.date.localeCompare(a.date));
const cancelled=sched.filter(s=>s.status==='Cancelled').sort((a,b)=>b.date.localeCompare(a.date));
const followUps=sched.filter(s=>s.status==='Completed'&&s.followUpDate&&s.followUpDate>=today).sort((a,b)=>a.followUpDate.localeCompare(b.followUpDate));
let h='';

// Stats
h+='<div class="stats-grid">';
h+='<div class="stat-card"><div class="label">Upcoming</div><div class="value" style="color:var(--gold);">'+upcoming.length+'</div></div>';
h+='<div class="stat-card'+(overdue.length>0?' red':'')+'"><div class="label">Overdue</div><div class="value" style="color:'+(overdue.length>0?'var(--danger)':'var(--success)')+';">'+overdue.length+'</div></div>';
h+='<div class="stat-card"><div class="label">Completed</div><div class="value" style="color:var(--success);">'+completed.length+'</div></div>';
h+='<div class="stat-card"><div class="label">Follow-Ups Due</div><div class="value" style="color:var(--warning);">'+followUps.length+'</div></div>';
h+='</div>';

// Add new session form
h+='<div class="form-section"><h3><i class="fas fa-plus-circle"></i> Schedule Coaching Session</h3>';
h+='<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end;">';
h+='<div><label style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;">Employee</label>';
h+='<select id="schedEmp" style="background:var(--navy-light);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;width:150px;">';
ALL_MEMBERS.forEach(p=>{h+='<option value="'+p+'">'+p+'</option>';});
h+='</select></div>';
h+='<div><label style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;">Date</label>';
h+='<input type="date" id="schedDate" value="'+today+'" style="background:var(--navy-light);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;"></div>';
h+='<div style="flex:1;min-width:180px;"><label style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;">Topic</label>';
h+='<input id="schedTopic" placeholder="Coaching topic / agenda" style="width:100%;background:var(--navy-light);color:var(--text);border:1px solid var(--border);padding:8px;border-radius:6px;"></div>';
h+='<div><label style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;">Follow-Up Date</label>';
h+='<input type="date" id="schedFollowUp" style="background:var(--navy-light);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;"></div>';
h+='<button class="btn btn-gold" onclick="addSession()"><i class="fas fa-calendar-plus"></i> Schedule</button>';
h+='</div></div>';

// Overdue alert
if(overdue.length>0){
h+='<div class="form-section" style="border-left:3px solid var(--danger);">';
h+='<h3 style="color:var(--danger);"><i class="fas fa-exclamation-circle"></i> Overdue Sessions ('+overdue.length+')</h3>';
overdue.forEach(s=>{
h+='<div style="display:flex;align-items:center;gap:15px;padding:12px;background:rgba(231,76,60,0.08);border-radius:8px;margin-bottom:8px;flex-wrap:wrap;">';

h+='<button class="btn btn-sm" style="background:var(--danger);color:#fff;" onclick="updateSessionStatus('+s.id+',\'Cancelled\')"><i class="fas fa-times"></i></button>';
h+='</div></div>';
});
h+='</div>';
}

// Follow-ups due
if(followUps.length>0){
h+='<div class="form-section" style="border-left:3px solid var(--warning);">';

followUps.forEach(s=>{

h+='<div class="form-section"><h3 style="color:var(--gold);"><i class="fas fa-calendar"></i> Upcoming Sessions ('+upcoming.length+')</h3>';
if(upcoming.length>0){
upcoming.forEach(s=>{

h+='</div>';
h+='<div style="color:var(--text-muted);font-size:13px;margin-top:5px;"><i class="fas fa-comment-dots"></i> '+s.topic.replace(/</g,'&lt;')+'</div></div>';
h+='<div style="display:flex;gap:6px;">';
h+='<button class="btn btn-gold btn-sm" onclick="updateSessionStatus('+s.id+',\'Completed\')"><i class="fas fa-check"></i> Complete</button>';
h+='<button class="btn btn-sm" style="background:var(--danger);color:#fff;" onclick="if(confirm(\'Cancel this session?\'))updateSessionStatus('+s.id+',\'Cancelled\')"><i class="fas fa-times"></i></button>';

h+='</div></div>';
// Notes area
h+='<div style="margin-top:10px;"><textarea id="schedNotes_'+s.id+'" placeholder="Pre-session notes or agenda items..." style="width:100%;min-height:50px;background:var(--navy);color:var(--text);border:1px solid var(--border);padding:8px;border-radius:6px;font-size:13px;resize:vertical;">'+((s.notes||'').replace(/</g,'&lt;'))+'</textarea>';
h+='<button class="btn btn-info btn-sm" style="margin-top:5px;" onclick="saveSessionNotes('+s.id+')"><i class="fas fa-save"></i> Save Notes</button></div>';
h+='</div>';
});
}else{
h+='<p style="color:var(--text-muted);text-align:center;padding:20px;">No upcoming sessions scheduled.</p>';
}
h+='</div>';

// Completed sessions
if(completed.length>0){
h+='<div class="form-section"><h3 style="color:var(--success);"><i class="fas fa-check-circle"></i> Completed Sessions ('+completed.length+')</h3>';
h+='<table><thead><tr><th>Employee</th><th>Date</th><th>Topic</th><th>Notes</th><th>Follow-Up</th><th></th></tr></thead><tbody>';
completed.forEach(s=>{
h+='<tr>';
h+='<td>'+s.employee+'</td>';
h+='<td style="font-size:12px;white-space:nowrap;">'+formatSchedDate(s.date)+'</td>';
h+='<td style="font-size:12px;">'+s.topic.replace(/</g,'&lt;')+'</td>';
h+='<td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;">'+(s.notes||'-').replace(/</g,'&lt;')+'</td>';
h+='<td style="font-size:12px;">'+(s.followUpDate?formatSchedDate(s.followUpDate):'-')+'</td>';
h+='<td><button class="btn btn-danger btn-sm" onclick="if(confirm(\'Delete?\'))deleteSession('+s.id+')"><i class="fas fa-trash"></i></button></td>';
h+='</tr>';
});
h+='</tbody></table></div>';
}

// Cancelled
if(cancelled.length>0){
h+='<div class="form-section"><h3 style="color:var(--text-muted);"><i class="fas fa-ban"></i> Cancelled ('+cancelled.length+')</h3>';
h+='<table><thead><tr><th>Employee</th><th>Date</th><th>Topic</th><th></th></tr></thead><tbody>';
cancelled.forEach(s=>{
h+='<tr style="opacity:0.6;">';
h+='<td>'+s.employee+'</td>';

h+='</tbody></table></div>';
}

if(sched.length===0){
h+='<div class="form-section" style="text-align:center;padding:40px;"><i class="fas fa-calendar-check" style="font-size:48px;color:var(--gold);margin-bottom:15px;display:block;"></i>';
